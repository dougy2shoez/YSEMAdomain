<script type="module">
import { marked } from './marked.min.js';

async function loadBlog() {
  const container = document.getElementById("blog-container");
  container.innerHTML = "loading...";

  const params = new URLSearchParams(window.location.search);
  const id = params.get("blog");

  if (!id) {
    container.innerHTML = `
    <img src="landopiss.jpg" width = 100pxstyle="max-width: 80%; border-radius: 8px;">
  `;
    return;
  }

  let index;
  try {
    index = await fetch("posts/index.json").then(r => r.json());
  } catch (err) {
    container.innerHTML = "<p>:( </p>";
    return;
  }

  const postEntry = index.find(p => p.id === id);

  if (!postEntry) {
    container.innerHTML = "<p>:( blog post not found, please notify dougy2shoez</p>";
    return;
  }

  const mdPath = `posts/${id}/post.md`;

  try {
    const response = await fetch(mdPath);
    if (!response.ok) throw new Error("Markdown not found");

    let markdown = await response.text();

    if (markdown.charCodeAt(0) === 0xFEFF) {
      markdown = markdown.substring(1);
    }
    let fixed = "";
    let i = 0;

    while (i < markdown.length) {
      const altStart = markdown.indexOf("![", i);

      if (altStart === -1) {
        fixed += markdown.slice(i);
        break;
      }

      fixed += markdown.slice(i, altStart);

      const altEnd = markdown.indexOf("]", altStart);
      const srcStart = markdown.indexOf("(", altEnd) + 1;
      const srcEnd = markdown.indexOf(")", srcStart);

      const alt = markdown.slice(altStart + 2, altEnd);
      const src = markdown.slice(srcStart, srcEnd);

      let newSrc = src;
      if (!src.startsWith("http") && !src.startsWith("posts/")) {
        newSrc = `posts/${id}/${src}`;
      }

      fixed += `![${alt}](${newSrc})`;

      i = srcEnd + 1;
    }

    markdown = fixed;

    const html = marked.parse(markdown);
    const date = new Date(
      postEntry.date.replace("T", " ") + " GMT-0500"
    );
    const formattedDate = date.toLocaleString("en-US", {
      year: "numeric",
      month: "long",
      day: "numeric",
      hour: "2-digit",
      minute: "2-digit"
    });


    container.innerHTML = `
      <article class="blog-post">
        <div class="post-timestamp">${formattedDate}</div>
        <div class="post-body">${html}</div>
      </article>
    `;
  } catch (err) {
    container.innerHTML = "<p>:(</p>";
  }
}

loadBlog();
</script>
