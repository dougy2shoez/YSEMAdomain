<style>@keyframes cycle {
      0%, 24.9% { opacity: 1; }
      25%, 100% { opacity: 0; }
    }

    .frame {
      opacity: 0;
      animation: cycle 0.2s steps(1) infinite;
    }
    .f1 { animation-delay: 0s; } <!-- these do fucking nothing -->
    .f2 { animation-delay: 0.05s; }
    .f3 { animation-delay: 0.1s; }
    .f4 { animation-delay: 0.15s; }</style>
<style>@keyframes cycle {
    0%, 24.9% { opacity: 1; visibility: visible; }
    25%, 100% { opacity: 0; visibility: hidden; }
  }

  .frame { 
    opacity: 0; 
    visibility: hidden; 
    animation: cycle 0.36s steps(1) infinite;
    }
    .f1 { animation-delay: 0s; }<!-- this does though -->
    .f2 { animation-delay: 0.09s; }
    .f3 { animation-delay: 0.18s; }
    .f4 { animation-delay: 0.27s; }</style>
